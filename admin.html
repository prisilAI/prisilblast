<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Infinity SenderBlast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #04040f; color: #fff; min-height: 100vh; padding: 32px 20px; }
    .header { max-width: 900px; margin: 0 auto 32px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.1rem; font-weight: 800; background: linear-gradient(135deg, #1a6fdb, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h1 { font-size: 1.5rem; font-weight: 800; }
    .login-box { max-width: 380px; margin: 100px auto; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 32px; }
    .login-box h2 { font-size: 1.3rem; margin-bottom: 20px; }
    input { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 0.9rem; outline: none; font-family: inherit; margin-bottom: 12px; }
    input:focus { border-color: #1a6fdb; }
    .btn { padding: 11px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 0.9rem; font-family: inherit; }
    .btn-blue { background: linear-gradient(135deg, #1a6fdb, #8a2be2); color: #fff; width: 100%; }
    .btn-green { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .btn-red { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .main { max-width: 900px; margin: 0 auto; display: none; }
    .table-wrap { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: rgba(255,255,255,0.05); padding: 14px 16px; text-align: left; font-size: 0.8rem; color: #64748b; font-weight: 600; letter-spacing: 0.5px; }
    td { padding: 14px 16px; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; }
    .badge-pending { background: rgba(234,179,8,0.15); color: #facc15; }
    .badge-approved { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-rejected { background: rgba(239,68,68,0.15); color: #f87171; }
    .actions { display: flex; gap: 8px; }
    .empty { text-align: center; padding: 60px; color: #475569; }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-box" id="loginBox">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Admin password"/>
    <button class="btn btn-blue" onclick="adminLogin()">Login</button>
    <div id="loginErr" style="color:#f87171; font-size:0.85rem; margin-top:8px;"></div>
  </div>

  <!-- Main -->
  <div class="main" id="mainPanel">
    <div class="header">
      <div class="logo">∞ INFINITY SENDERBLAST</div>
      <h1>Admin Panel</h1>
      <button class="btn btn-red" onclick="logout()">Logout</button>
    </div>

    <h2 style="margin-bottom:16px; font-size:1.1rem; color:#94a3b8;">📋 Pending Pembayaran</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>EMAIL</th>
            <th>PAKET</th>
            <th>REF</th>
            <th>WAKTU</th>
            <th>STATUS</th>
            <th>AKSI</th>
          </tr>
        </thead>
        <tbody id="paymentList">
          <tr><td colspan="6" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let adminToken = sessionStorage.getItem('adminToken');
    if (adminToken) showMain();

    async function adminLogin() {
      const pass = document.getElementById('adminPass').value;
      const res = await fetch('/api/admin-approve', {
        headers: { 'Authorization': 'Bearer ' + pass }
      });
      if (res.ok) {
        adminToken = pass;
        sessionStorage.setItem('adminToken', pass);
        showMain();
      } else {
        document.getElementById('loginErr').textContent = 'Password salah!';
      }
    }

    function showMain() {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('mainPanel').style.display = 'block';
      loadPayments();
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    async function loadPayments() {
      const res = await fetch('/api/admin-approve', {
        headers: { 'Authorization': 'Bearer ' + adminToken }
      });
      const data = await res.json();
      const tbody = document.getElementById('paymentList');
      
      if (!data.payments || data.payments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">✅ Tidak ada pembayaran pending</td></tr>';
        return;
      }

      tbody.innerHTML = data.payments.map(p => `
        <tr>
          <td>${p.email}</td>
          <td><span style="text-transform:capitalize; font-weight:600;">${p.plan}</span></td>
          <td style="font-family:monospace; font-size:0.85rem; color:#94a3b8;">${p.ref}</td>
          <td style="color:#64748b; font-size:0.85rem;">${new Date(p.submittedAt).toLocaleString('id-ID')}</td>
          <td><span class="badge badge-${p.status}">${p.status}</span></td>
          <td>
            ${p.status === 'pending' ? `
              <div class="actions">
                <button class="btn btn-green" onclick="approve('${p.ref}')">✓ Approve</button>
                <button class="btn btn-red" onclick="reject('${p.ref}')">✗ Reject</button>
              </div>
            ` : '-'}
          </td>
        </tr>
      `).join('');
    }

    async function approve(ref) {
      if (!confirm('Approve pembayaran ini?')) return;
      const res = await fetch('/api/admin-approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
        body: JSON.stringify({ ref, action: 'approve' })
      });
      const data = await res.json();
      alert(data.success ? '✅ Approved! Akun user sudah diupgrade.' : '❌ ' + data.error);
      loadPayments();
    }

    async function reject(ref) {
      if (!confirm('Reject pembayaran ini?')) return;
      await fetch('/api/admin-approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
        body: JSON.stringify({ ref, action: 'reject' })
      });
      loadPayments();
    }
  </script>
</body>
</html>
