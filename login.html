<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Infinity SenderBlast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1a2e; border: 1px solid #333; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
    .logo { text-align: center; font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #1a6fdb, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    h2 { text-align: center; font-size: 1.4rem; margin-bottom: 6px; }
    .sub { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; background: #0f1117; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; }
    input:focus { border-color: #1a6fdb; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #1a6fdb, #8a2be2); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .reg-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #888; }
    .reg-link a { color: #1a6fdb; text-decoration: none; }
    .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
    .alert-error { background: #2d1515; border: 1px solid #c0392b; color: #e74c3c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">∞ INFINITY SENDERBLAST</div>
    <h2>Login</h2>
    <p class="sub">Selamat datang kembali!</p>
    <div class="alert alert-error" id="alertError"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="email@kamu.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Password kamu"/>
    </div>
    <button class="btn" id="btnLogin" onclick="login()">Login</button>
    <div class="reg-link">Belum punya akun? <a href="/register">Daftar Gratis</a></div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const errEl = document.getElementById('alertError');

      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Email dan password wajib diisi!';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Login...';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('pb_token', data.token);
          localStorage.setItem('pb_email', email);
          window.location.href = '/dashboard';
        } else {
          errEl.textContent = data.error || 'Email atau password salah';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      } catch(e) {
        errEl.textContent = 'Error koneksi: ' + e.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
