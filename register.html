<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar - Infinity SenderBlast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1a2e; border: 1px solid #333; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
    .logo { text-align: center; font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #1a6fdb, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    h2 { text-align: center; font-size: 1.4rem; margin-bottom: 6px; }
    .sub { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; background: #0f1117; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; }
    input:focus { border-color: #1a6fdb; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #1a6fdb, #8a2be2); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #888; }
    .login-link a { color: #1a6fdb; text-decoration: none; }
    .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
    .alert-error { background: #2d1515; border: 1px solid #c0392b; color: #e74c3c; }
    .alert-success { background: #152d1a; border: 1px solid #27ae60; color: #2ecc71; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">∞ INFINITY SENDERBLAST</div>
    <h2>Daftar Akun</h2>
    <p class="sub">Gratis 50 pesan/hari</p>
    <div class="alert alert-error" id="alertError"></div>
    <div class="alert alert-success" id="alertSuccess"></div>
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Nama kamu"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="email@kamu.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 karakter"/>
    </div>
    <button class="btn" id="btnDaftar" onclick="daftar()">Daftar Sekarang</button>
    <div class="login-link">Sudah punya akun? <a href="/login">Login</a></div>
  </div>

  <script>
    async function daftar() {
      const nama = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnDaftar');
      const errEl = document.getElementById('alertError');
      const okEl = document.getElementById('alertSuccess');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (!nama || !email || !password) {
        errEl.textContent = 'Semua field wajib diisi!';
        errEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password minimal 6 karakter!';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Mendaftarkan...';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'register', nama, email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('pb_token', data.token);
          localStorage.setItem('pb_email', email);
          okEl.textContent = 'Berhasil! Mengarahkan ke dashboard...';
          okEl.style.display = 'block';
          setTimeout(() => window.location.href = '/dashboard', 1500);
        } else {
          errEl.textContent = data.error || 'Gagal daftar';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Daftar Sekarang';
        }
      } catch(e) {
        errEl.textContent = 'Error koneksi: ' + e.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Daftar Sekarang';
      }
    }
  </script>
</body>
</html>
